<!doctype html><html><head><meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;background:#1b1b22;}
  /* left-aligned so a 390px iframe is fully captured even though Chrome clamps
     the PARENT layout viewport to ~500px; the iframe gets its own 390px viewport. */
  iframe{width:390px;height:844px;border:0;display:block;background:#000;}
</style></head><body>
<iframe id="f"></iframe>
<script>
  var q=new URLSearchParams(location.search);
  var p=q.get('f'); var h=q.get('h');
  if(p) document.getElementById('f').src = p + (h ? '#'+h : '');
</script>
</body></html>
